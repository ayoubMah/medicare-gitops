apiVersion: v1
kind: Service
metadata:
  name: {{ include "medicare-plus.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "medicare-plus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "medicare-plus.selectorLabels" . | nindent 4 }}
