# Default values — dev environment baseline
replicaCount: 1
namespace: medicare-dev

image:
  repository: nginx
  tag: "1.26"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
probes:
  startup:
    path: /
    port: 80
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /
    port: 80
    initialDelaySeconds: 0
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /
    port: 80
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
