apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-portal
  labels:
    app: patient-portal
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-portal
  template:
    metadata:
      labels:
        app: patient-portal
        version: v1.0.0
    spec:
      containers:
      - name: patient-portal
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

