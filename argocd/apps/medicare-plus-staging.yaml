apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medicare-plus-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ayoubMah/medicare-gitops.git
    targetRevision: week-08
    path: helm-charts/medicare-plus
    helm:
      valueFiles:
        - ../values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: medicare-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
