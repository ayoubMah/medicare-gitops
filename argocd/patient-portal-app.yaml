apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: patient-portal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ayoubMah/medicare-gitops.git
    targetRevision: master
    path: apps/patient-portal
  destination:
    server: https://kubernetes.default.svc
    namespace: medicare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
